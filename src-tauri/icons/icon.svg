<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <!-- Wheat/grain icon -->
  <g fill="#FFFFFF" transform="translate(256,256) scale(3.5)">
    <!-- Central stem -->
    <rect x="-3" y="-50" width="6" height="100" rx="3"/>
    <!-- Left grains -->
    <ellipse cx="-20" cy="-35" rx="12" ry="20" transform="rotate(-20)"/>
    <ellipse cx="-18" cy="-10" rx="11" ry="18" transform="rotate(-15)"/>
    <ellipse cx="-15" cy="15" rx="10" ry="16" transform="rotate(-10)"/>
    <!-- Right grains -->
    <ellipse cx="20" cy="-35" rx="12" ry="20" transform="rotate(20)"/>
    <ellipse cx="18" cy="-10" rx="11" ry="18" transform="rotate(15)"/>
    <ellipse cx="15" cy="15" rx="10" ry="16" transform="rotate(10)"/>
  </g>
  <!-- F letter overlay -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">F</text>
</svg>
